application:
  subdomain: trek
  oidc_redirect_path: /api/auth/oidc/callback
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://trek-app:3000/
  injects:
    - id: lazycat-file-chooser
      on: browser
      when:
        - /*
      do:
        - src: file:///lzcapp/pkg/content/lazycat-injects/lzc-file-chooser-inject.js
    - id: login-autofill
      when:
        - /login
      do:
        - src: builtin://simple-inject-password
          params:
            user: "{{ .U.admin_email }}"
            password: "{{ .U.admin_password }}"
services:
  trek-app:
    # mauriceboe/trek:3.4.1
    # upstream: mauriceboe/trek:3.4.1
    image: registry.lazycat.cloud/czyt/mauriceboe/trek:d523401774aebc4f
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ENCRYPTION_KEY={{ stable_secret "trek_encryption_key" }}
      - TZ={{.U.tz}}
      - LOG_LEVEL=info
      - DEFAULT_LANGUAGE=zh
      - ALLOWED_ORIGINS=https://{{.S.AppDomain}}
      - APP_URL=https://{{.S.AppDomain}}
      - FORCE_HTTPS=true
      - TRUST_PROXY=1
      - OIDC_ISSUER=${LAZYCAT_AUTH_OIDC_ISSUER_URI}
      - OIDC_CLIENT_ID=${LAZYCAT_AUTH_OIDC_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${LAZYCAT_AUTH_OIDC_CLIENT_SECRET}
      - OIDC_ADMIN_CLAIM=groups # OIDC claim used to identify admin users
      - OIDC_ADMIN_VALUE=app-trek-admins # Value of the OIDC claim that grants admin role
      - OIDC_SCOPE=openid email profile groups # Fully overrides the default. Add extra scopes as needed (e.g. add groups if using OIDC_ADMIN_CLAIM)
      - OIDC_DISPLAY_NAME=懒猫账号
      - OIDC_ONLY={{.U.oidc_only}}
      - ADMIN_EMAIL={{.U.admin_email}}
      - ADMIN_PASSWORD={{.U.admin_password}}
    binds:
      - /lzcapp/var/data:/app/data
      - /lzcapp/var/uploads:/app/uploads
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    cpus: 2.0
    mem_limit: 1g
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://localhost:3000/api/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
usage: |
  ## 首次部署
  安装时通过设置向导配置时区和管理员账号。默认启用 OIDC-only 模式（仅懒猫账号登录），首个匹配管理员声明的 OIDC 用户自动成为 TREK 管理员。

  ## 密码登录
  如需启用邮箱/密码登录，在设置向导中将「仅 OIDC 登录」关闭，管理员邮箱/密码会自动填充到登录页。

  ## 用户管理
  后续用户由管理员在 TREK 后台控制注册或邀请策略。文件上传下载已接入懒猫文件选择器。
